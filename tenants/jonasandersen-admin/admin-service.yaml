apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: jonasandersen-admin
spec:
  selector:
    matchLabels:
      app: jonasandersen-admin
  replicas: 1
  template:
    metadata:
      labels:
        app: jonasandersen-admin
    spec:
      containers:
        - image: bjoggis/jonasandersen-admin:v80 # {"$imagepolicy": "flux-system:jonasandersen-admin"}
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "1024Mi"
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
          name: jonasandersen-admin
---
apiVersion: v1
kind: Service
metadata:
  name: jonasandersen-admin-tailscale
  namespace: jonasandersen-admin
  annotations:
    # Optional: Force a specific tailscale hostname
    tailscale.com/hostname: "jonasandersen-admin"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app: jonasandersen-admin
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
