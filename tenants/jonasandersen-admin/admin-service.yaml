apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: jonasandersen-admin
spec:
  selector:
    matchLabels:
      app: jonasandersen-admin
  replicas: 1
  template:
    metadata:
      labels:
        app: jonasandersen-admin
    spec:
      containers:
        - image: bjoggis/jonasandersen-admin:v79 # {"$imagepolicy": "flux-system:jonasandersen-admin"}
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "1024Mi"
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
          name: jonasandersen-admin
