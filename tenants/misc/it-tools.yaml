apiVersion: apps/v1
kind: Deployment
metadata:
  name: it-tools
  namespace: misc
spec:
  selector:
    matchLabels:
      app: it-tools
  replicas: 1
  template:
    metadata:
      labels:
        app: it-tools
    spec:
      containers:
        - image: sharevb/it-tools:2025.12.7
          name: it-tools
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "256Mi"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: it-tools-service
  namespace: misc
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
  selector:
    app: it-tools
